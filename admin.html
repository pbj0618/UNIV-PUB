<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UNIV PUB ADMIN</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@100;400;700;900&display=swap');
        
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #09090b; /* 트렌디한 깊은 블랙 (Zinc-950) */
            color: #ffffff;
            letter-spacing: -0.02em;
            -webkit-font-smoothing: antialiased;
        }

        /* 스크롤바 숨기기 및 바운스 효과 */
        ::-webkit-scrollbar { display: none; }
        .bouncing { transition: transform 0.1s cubic-bezier(0, 0, 0.2, 1); }
        .bouncing:active { transform: scale(0.96); }

        /* 다크 글래스모피즘 효과 */
        .glass-nav {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        /* 트렌디한 네온 그라데이션 텍스트 */
        .grad-text {
            background: linear-gradient(135deg, #22d3ee 0%, #d946ef 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 텍스트 글로우 효과 */
        .glow-text-cyan { text-shadow: 0 0 15px rgba(34, 211, 238, 0.5); }
        .glow-text-fuchsia { text-shadow: 0 0 15px rgba(217, 70, 239, 0.5); }
    </style>
</head>
<body class="selection:bg-cyan-500/30 pb-20">

    <header class="glass-nav sticky top-0 z-[60] px-6 py-5 flex justify-between items-center border-b border-white/10">
        <div class="flex flex-col">
            <h1 class="text-2xl font-[900] tracking-tighter grad-text">PUB.ADMIN</h1>
            <div class="flex items-center gap-1.5 mt-1">
                <span class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"></span>
                <span class="text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Live Dashboard</span>
            </div>
        </div>
        <div class="text-right bg-white/5 border border-white/10 px-4 py-2 rounded-[16px]">
            <p class="text-[9px] text-zinc-500 font-black uppercase tracking-widest mb-0.5">Today Revenue</p>
            <p class="text-lg font-black text-white tracking-tight"><span id="total-revenue">0</span> <span class="text-xs text-cyan-400 font-bold">원</span></p>
        </div>
    </header>

    <div class="sticky top-[73px] z-[50] glass-nav px-6 py-4 flex gap-3 overflow-x-auto no-scrollbar border-b border-white/5">
        <button class="bg-cyan-500/20 border border-cyan-500/50 text-cyan-400 px-5 py-2.5 rounded-full text-sm font-black whitespace-nowrap shadow-[0_0_15px_rgba(34,211,238,0.15)] transition-all">
            실시간 주문 현황
        </button>
    </div>

    <main id="order-container" class="max-w-xl mx-auto px-6 py-6 space-y-5">
        <div class="text-center py-10 text-zinc-500 font-bold text-sm">
            <i class="fa-solid fa-spinner fa-spin text-2xl mb-3 text-cyan-400"></i><br>
            주문 데이터를 불러오는 중입니다...
        </div>
    </main>

    <div class="fixed bottom-6 right-6 z-[70]">
        <button onclick="window.scrollTo({top: 0, behavior: 'smooth'})" class="w-14 h-14 bg-[#18181b] border border-white/10 rounded-full flex items-center justify-center shadow-2xl active:scale-90 transition-transform relative">
            <i class="fa-solid fa-arrow-up text-white text-xl"></i>
        </button>
    </div>

    <script type="module">
        // 🚨 Firebase SDK에 'remove' 함수가 추가되었습니다.
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // 범준님의 Firebase 설정값
        const firebaseConfig = {
            apiKey: "AIzaSyAGOQBwgckWLmEyFGrJGOzxHBS40Ek72Ns",
            authDomain: "univ-pub-project.firebaseapp.com",
            databaseURL: "https://univ-pub-project-default-rtdb.firebaseio.com",
            projectId: "univ-pub-project",
            storageBucket: "univ-pub-project.firebasestorage.app",
            messagingSenderId: "828116319670",
            appId: "1:828116319670:web:7af97e8645db038e6f9517",
            measurementId: "G-WHSYQ25Q2C"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('order-container');

        // 상태 변경 함수 (전역 등록)
        window.changeOrderStatus = function(orderId, currentStatus) {
            let newStatus = 'cooking';
            if (currentStatus === 'cooking') newStatus = 'done';
            
            update(ref(db, 'orders/' + orderId), { status: newStatus })
                .then(() => console.log('상태 업데이트 완료!'))
                .catch((e) => alert('오류가 발생했습니다: ' + e));
        };

        // 🚨 주문 삭제 함수 추가 (전역 등록)
        window.deleteOrder = function(orderId) {
            if (confirm("이 주문 기록을 완전히 삭제하시겠습니까?")) {
                remove(ref(db, 'orders/' + orderId))
                    .then(() => console.log('삭제 완료!'))
                    .catch((e) => alert('삭제 중 오류가 발생했습니다: ' + e));
            }
        };

        // 데이터 실시간 감지
        onValue(ref(db, 'orders/'), (snapshot) => {
            const data = snapshot.val();
            container.innerHTML = ''; // 초기화
            let totalRevenue = 0;

            if (!data) {
                container.innerHTML = `<div class="text-center py-10 text-zinc-500 font-bold text-sm">아직 들어온 주문이 없습니다.</div>`;
                document.getElementById('total-revenue').innerText = "0";
                return;
            }

            // 데이터를 배열로 변환 후 최신 주문이 위로 오게 정렬
            const orders = Object.keys(data).map(key => ({ id: key, ...data[key] }));
            orders.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            orders.forEach(order => {
                totalRevenue += order.totalAmount || 0;

                // 주문 내역 텍스트 생성
                let itemsListHtml = '';
                if(order.items && Array.isArray(order.items)) {
                    order.items.forEach(item => {
                        itemsListHtml += `<p class="text-lg font-black text-white">${item.name} <span class="text-sm font-medium text-zinc-500">x1</span></p>`;
                    });
                }

                let cardHtml = '';

                // 1. 입금 대기 (Pending) - Fuchsia
                if (order.status === 'pending') {
                    cardHtml = `
                    <div class="bouncing relative bg-[#18181b] border border-fuchsia-500/40 rounded-[28px] p-5 shadow-[0_0_30px_rgba(217,70,239,0.1)] overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-32 h-32 bg-fuchsia-500/10 blur-3xl rounded-full"></div>
                        <div class="relative z-10 space-y-4">
                            <div class="flex justify-between items-start border-b border-white/5 pb-3">
                                <div class="flex items-center gap-3">
                                    <div class="bg-fuchsia-500 text-black font-black text-xl w-12 h-12 rounded-[16px] flex items-center justify-center shadow-[0_0_15px_rgba(217,70,239,0.4)]">
                                        ${order.table || '00'}
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-fuchsia-400 font-black uppercase tracking-widest glow-text-fuchsia">Table No.</p>
                                        <p class="text-sm font-bold text-zinc-400 mt-0.5"><i class="fa-regular fa-clock mr-1"></i> 신규 주문</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="bg-fuchsia-500/20 text-fuchsia-400 border border-fuchsia-500/30 px-3 py-1 rounded-full text-[11px] font-black tracking-wide animate-pulse">
                                        입금 대기
                                    </span>
                                    <button onclick="deleteOrder('${order.id}')" class="w-6 h-6 flex items-center justify-center rounded-full bg-white/5 hover:bg-red-500/20 text-zinc-500 hover:text-red-400 transition-colors" title="기록 삭제">
                                        <i class="fa-solid fa-trash-can text-[10px]"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="space-y-1">${itemsListHtml}</div>
                            <div class="bg-black/40 rounded-[20px] p-4 flex justify-between items-center border border-white/5">
                                <div>
                                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-1">입금자명</p>
                                    <p class="text-base font-black text-white">${order.customer}</p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-1">결제 금액</p>
                                    <p class="text-lg font-black text-fuchsia-400">${(order.totalAmount || 0).toLocaleString()}원</p>
                                </div>
                            </div>
                            <button onclick="changeOrderStatus('${order.id}', 'pending')" class="w-full bg-fuchsia-500/20 hover:bg-fuchsia-500/30 border border-fuchsia-500/50 text-fuchsia-400 py-4 rounded-[20px] font-[900] text-base transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-check-double text-sm"></i> 입금 확인 및 조리 시작
                            </button>
                        </div>
                    </div>`;
                } 
                // 2. 조리 중 (Cooking) - Cyan
                else if (order.status === 'cooking') {
                    cardHtml = `
                    <div class="bouncing relative bg-[#18181b] border border-cyan-500/30 rounded-[28px] p-5 shadow-[0_0_20px_rgba(34,211,238,0.05)] overflow-hidden">
                        <div class="absolute -right-10 -top-10 w-32 h-32 bg-cyan-500/10 blur-3xl rounded-full"></div>
                        <div class="relative z-10 space-y-4">
                            <div class="flex justify-between items-start border-b border-white/5 pb-3">
                                <div class="flex items-center gap-3">
                                    <div class="bg-white/10 border border-white/20 text-white font-black text-xl w-12 h-12 rounded-[16px] flex items-center justify-center">
                                        ${order.table || '00'}
                                    </div>
                                    <div>
                                        <p class="text-[10px] text-cyan-400 font-black uppercase tracking-widest">Table No.</p>
                                    </div>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-cyan-400 text-[11px] font-black tracking-wide flex items-center gap-1.5">
                                        <i class="fa-solid fa-fire text-orange-400"></i> 조리 중
                                    </span>
                                    <button onclick="deleteOrder('${order.id}')" class="w-6 h-6 flex items-center justify-center rounded-full bg-white/5 hover:bg-red-500/20 text-zinc-500 hover:text-red-400 transition-colors" title="기록 삭제">
                                        <i class="fa-solid fa-trash-can text-[10px]"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="space-y-1">${itemsListHtml}</div>
                            <div class="bg-black/40 rounded-[20px] p-4 flex justify-between items-center border border-white/5">
                                <div>
                                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-1">입금자명</p>
                                    <p class="text-base font-black text-zinc-300">${order.customer} <i class="fa-solid fa-circle-check text-cyan-400 text-sm ml-1"></i></p>
                                </div>
                                <div class="text-right">
                                    <p class="text-[10px] text-zinc-500 font-black uppercase tracking-widest mb-1">결제 금액</p>
                                    <p class="text-lg font-black text-zinc-300">${(order.totalAmount || 0).toLocaleString()}원</p>
                                </div>
                            </div>
                            <button onclick="changeOrderStatus('${order.id}', 'cooking')" class="w-full bg-cyan-400 text-black py-4 rounded-[20px] font-[900] text-base shadow-[0_0_15px_rgba(34,211,238,0.3)] transition-all flex items-center justify-center gap-2">
                                <i class="fa-solid fa-bell text-sm"></i> 조리 완료 및 서빙
                            </button>
                        </div>
                    </div>`;
                } 
                // 3. 서빙 완료 (Done) - Gray
                else {
                    cardHtml = `
                    <div class="relative bg-white/5 border border-white/5 rounded-[28px] p-5 opacity-60">
                        <div class="relative z-10 space-y-3">
                            <div class="flex justify-between items-center border-b border-white/5 pb-3">
                                <div class="flex items-center gap-3">
                                    <div class="bg-white/5 text-zinc-500 font-black text-xl w-10 h-10 rounded-[12px] flex items-center justify-center">
                                        ${order.table || '00'}
                                    </div>
                                    <p class="text-xs font-bold text-zinc-500">완료된 주문</p>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="text-zinc-500 text-[11px] font-black tracking-wide">서빙 완료</span>
                                    <button onclick="deleteOrder('${order.id}')" class="w-6 h-6 flex items-center justify-center rounded-full bg-white/5 hover:bg-red-500/20 text-zinc-500 hover:text-red-400 transition-colors" title="기록 삭제">
                                        <i class="fa-solid fa-trash-can text-[10px]"></i>
                                    </button>
                                </div>
                            </div>
                            <div class="flex justify-between items-center">
                                <p class="text-base font-bold text-zinc-400">${order.customer}님 주문</p>
                                <p class="text-sm font-black text-zinc-500">${(order.totalAmount || 0).toLocaleString()}원</p>
                            </div>
                        </div>
                    </div>`;
                }

                container.innerHTML += cardHtml;
            });

            // 총 매출 업데이트
            document.getElementById('total-revenue').innerText = totalRevenue.toLocaleString();
        });
    </script>
</body>
</html>
